# Auto-fix workflow triggered by PipelineHealer
name: Auto-fix ESLint

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ESLint fix
        run: npx eslint --fix .
      - name: Commit changes
        run: |
          git config user.name "PipelineHealer"
          git config user.email "pipelinehealer@example.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: Auto-fix ESLint issues"
          git push
